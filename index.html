<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Vue 拼团分销 Demo</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    .card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin: 20px; }
  </style>
</head>
<body>
  <div id="app">
    <h1>{{ product.name }}</h1>

    <div class="card">
      <p>当前进度: {{ currentCount }} / {{ targetCount }} 人</p>
      <button @click="joinGroup">参团</button>
    </div>

    <div class="card">
      <button @click="copyLink">复制我的推广链接</button>
    </div>
  </div>

  <script>
    const { createApp, ref, onMounted } = Vue

    createApp({
      setup() {
        const product = { name: '高浓度鱼油' }
        const currentCount = ref(1)
        const targetCount = 3

        const joinGroup = () => { currentCount.value++ }

        const copyLink = () => {
          const link = window.location.origin + "/?ref=USER_888"
          navigator.clipboard.writeText(link)
          alert("链接已复制")
        }

        onMounted(() => {
          // 这里可以获取 URL 参数
          const urlParams = new URLSearchParams(window.location.search);
          const ref = urlParams.get('ref');
          if(ref) localStorage.setItem('referrer', ref);
        })

        return { product, currentCount, targetCount, joinGroup, copyLink }
      }
    }).mount('#app')
  </script>
</body>
</html>
